<script>
// ==========================================
// CLIENT-SIDE WEB CONTROLLER
// ==========================================
const API_BASE = "https://client-vi.vercel.app";

let products = [], categories = [], categoryMap = {}, activeCategory = 'all';
let cart = JSON.parse(localStorage.getItem('shobdotori_cart') || '[]');
let wishlist = JSON.parse(localStorage.getItem('shobdotori_wishlist') || '[]');
let currentUser = JSON.parse(localStorage.getItem('shobdotori_user') || 'null');
let revealObserver = null;

const $ = (s) => document.querySelector(s);
const $$ = (s) => document.querySelectorAll(s);

// Dynamic Script Loader
function loadScript(src) {
  return new Promise((resolve, reject) => {
    if (document.querySelector(`script[src="${src}"]`)) {
      resolve();
      return;
    }
    const script = document.createElement('script');
    script.src = src;
    script.async = true;
    script.onload = resolve;
    script.onerror = reject;
    document.head.appendChild(script);
  });
}

function getHeaders() {
  const headers = { "Content-Type": "application/json" };
  if (currentUser && currentUser.uid) {
    headers["x-user-uid"] = currentUser.uid;
    headers["x-user-email"] = currentUser.email;
  }
  return headers;
}

function saveCart() { localStorage.setItem('shobdotori_cart', JSON.stringify(cart)); updateCartBadge(); }
function saveWishlist() { localStorage.setItem('shobdotori_wishlist', JSON.stringify(wishlist)); updateWishlistBadge(); }

function formatPrice(p) { return '₹' + Number(p).toFixed(2); }
function discountPercent(o,c) { if(!o||o<=c) return null; return Math.round(((o-c)/o)*100); }
function getStockDisplay(stock) { return (stock === undefined || stock === null || stock === '' || stock === 0) ? '0' : stock; }

async function loadAllData() {
  try {
    const [pRes, cRes] = await Promise.all([
      fetch(API_BASE + "/api/products"), 
      fetch(API_BASE + "/api/categories")
    ]);
    if (!pRes.ok || !cRes.ok) throw new Error("Server payload query failed.");
    products = await pRes.json();
    categories = await cRes.json();
    categories.forEach(cat => categoryMap[cat.id] = cat.name);
    await loadFooterSocials();
  } catch(e) { 
    console.warn("Catalog connection error. Loading offline state:", e); 
  } finally {
    document.body.classList.add('ready');
    renderMainView();
    observeReveal();
    updateCartBadge(); updateWishlistBadge();
  }
}

async function loadFooterSocials() {
  const container = $('#footer-social-container'); if (!container) return;
  try {
    const res = await fetch(API_BASE + "/api/socials");
    const data = await res.json();
    let html = '';
    // SVG Based Social Icons to avoid external library load
    if (data.facebook) {
      html += `<a href="${data.facebook}" target="_blank" rel="noopener noreferrer" class="social-bubble social-bubble-facebook" aria-label="Facebook Profile">
        <svg class="social-svg-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M22 12c0-5.52-4.48-10-10-10S2 6.48 2 12c0 4.84 3.44 8.87 8 9.8V15H8v-3h2V9.5C10 7.57 11.57 6 13.5 6H16v3h-2c-.55 0-1 .45-1 1v2h3v3h-3v6.95c4.56-.93 8-4.96 8-9.75z"/></svg>
      </a>`;
    }
    if (data.instagram) {
      html += `<a href="${data.instagram}" target="_blank" rel="noopener noreferrer" class="social-bubble social-bubble-instagram" aria-label="Instagram Profile">
        <svg class="social-svg-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.051.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
      </a>`;
    }
    if (data.twitter) {
      html += `<a href="${data.twitter}" target="_blank" rel="noopener noreferrer" class="social-bubble social-bubble-twitter" aria-label="Twitter Profile">
        <svg class="social-svg-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      </a>`;
    }
    container.innerHTML = html;
  } catch (err) { console.error('Error rendering socials: ', err); }
}

window.closeOverlay = function(overlayElement) {
  if (!overlayElement) return;
  overlayElement.classList.add('closing');
  overlayElement.addEventListener('animationend', function onEnd(e) {
    if (e.target === overlayElement) {
      overlayElement.remove();
      if (!document.querySelector('.full-page-overlay:not(.closing)')) {
        document.body.style.overflow = '';
      }
      overlayElement.removeEventListener('animationend', onEnd);
    }
  });
};

function getRatingStarsHTML(rating) {
  if (!rating) return '';
  let stars = '';
  for (let i = 1; i <= 5; i++) {
    const filled = i <= Math.round(rating);
    stars += `
      <svg class="star-icon ${filled ? 'filled' : ''}" viewBox="0 0 24 24" fill="${filled ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
      </svg>
    `;
  }
  return `<div class="rating-container">${stars} <span class="rating-text">(${Number(rating).toFixed(1)})</span></div>`;
}

function productCard(product) {
  const disc = discountPercent(product.originalPrice, product.price);
  return `
  <div class="product-card reveal-on-scroll" onclick="window.goToProductDetail('${product.id}')">
    <div class="book-cover-wrap">
      <img src="${product.image ? product.image + '&fm=webp&q=70' : ''}" alt="${product.name}" class="book-cover-img" onerror="this.style.display='none';this.parentElement.style.background='#F3F0FF';" loading="lazy" width="180" height="240">
      ${product.badge?`<span class="badge-tag uppercase">${product.badge}</span>`:''}
      ${disc ? `<span class="badge-discount">-${disc}%</span>` : ''}
    </div>
    <div class="product-info">
      <h3 class="product-title">${product.name}</h3>
      <div class="price-row">
        <span class="price-current">${formatPrice(product.price)}</span>
        ${product.originalPrice > product.price ? `<span class="price-original">${formatPrice(product.originalPrice)}</span>` : ''}
      </div>
      ${product.averageRating ? getRatingStarsHTML(product.averageRating) : ''}
    </div>
    <button class="add-to-cart-btn btn-primary" data-id="${product.id}" aria-label="Add ${product.name} to Cart">
      <span class="btn-text">Add to Cart</span>
    </button>
  </div>`;
}

function attachListeners() {
  $$('.add-to-cart-btn').forEach(b => b.onclick = (e) => {
    e.stopPropagation();
    const id = String(b.dataset.id);
    const existing = cart.find(i => String(i.id) === id);
    if (existing) existing.qty++; else cart.push({ id, qty: 1 });
    saveCart();
    b.classList.add('animate-success');
    b.innerHTML = `
      <svg class="check-icon" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path>
      </svg> Added`;
    setTimeout(() => {
      b.classList.remove('animate-success');
      b.innerHTML = '<span class="btn-text">Add to Cart</span>';
    }, 1400);
  });
}

function filterProducts(catId) {
  activeCategory = catId; const grid = $('#products-grid'); if (!grid) return;
  let filtered = catId === 'all' ? products : products.filter(p => p.category === catId);
  const sorted = [...filtered].sort((a,b) => (b.reviews||0) - (a.reviews||0));
  grid.innerHTML = sorted.length ? sorted.map(p => productCard(p)).join('') : '<p class="no-products">No products found</p>';
  attachListeners();
  observeReveal();
}

function renderMainView() {
  const main = $('#main-content');
  main.innerHTML = `
  <section class="hero-section">
    <div class="hero-bg">
      <div class="ambient-circle pos-1" aria-hidden="true"></div>
      <div class="ambient-circle pos-2" aria-hidden="true"></div>
    </div>
    <div class="hero-container">
      <div class="hero-content reveal-on-scroll">
        <h1 class="hero-title">Your Premier Literary Haven</h1>
        <p class="hero-subtitle">Selected collections and titles direct to your bookshelf.</p>
        <a href="#products" class="btn-hero-cta" aria-label="Browse catalog items">
          <span class="cta-text">Shop Collection</span>
          <svg viewBox="0 0 48 48" class="arrow-icon" aria-hidden="true">
            <path d="M16 10L32 24L16 38" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
      </div>
    </div>
  </section>
  <section id="products" class="catalog-section">
    <h2 class="catalog-heading reveal-on-scroll">Discover Collection</h2>
    <div class="search-wrap reveal-on-scroll">
      <input type="text" id="product-search" placeholder="Search by book title, author name or keywords..." class="search-input" aria-label="Search bookstore collections" readonly>
      <span class="search-icon-container">
        <svg class="search-svg" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
      </span>
    </div>
    <div class="category-tabs-container" id="category-tabs">
      <button class="cat-tab active" data-cat="all" aria-label="Show all categories">All</button>
      ${categories.map(c => `<button class="cat-tab" data-cat="${c.id}" aria-label="Category ${c.name}">${c.name}</button>`).join('')}
    </div>
    <div class="products-grid" id="products-grid"></div>
  </section>`;

  $$('.cat-tab').forEach(tab => {
    tab.onclick = () => {
      $$('.cat-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      filterProducts(tab.dataset.cat);
    };
  });

  const searchInput = $('#product-search');
  if (searchInput) searchInput.onclick = () => window.openSearchOverlay();

  filterProducts('all');
  observeReveal();
}

window.openSearchOverlay = function() {
  const existing = document.querySelector('#search-overlay-page'); if (existing) existing.remove();
  const overlay = document.createElement('div'); overlay.id = 'search-overlay-page'; overlay.className = 'full-page-overlay';
  overlay.innerHTML = `
  <div class="overlay-inner max-w-2xl">
    <div class="overlay-header">
      <input id="overlay-search-input" type="text" placeholder="Search books..." class="search-overlay-input" aria-label="Enter book search parameters">
      <button id="close-search-overlay" class="close-btn" aria-label="Close search window">Close</button>
    </div>
    <div class="overlay-body">
      <div id="overlay-search-results-grid" class="search-results-grid"></div>
    </div>
  </div>`;
  
  document.body.appendChild(overlay); document.body.style.overflow = 'hidden';
  overlay.querySelector('#close-search-overlay').onclick = () => window.closeOverlay(overlay);
  
  const input = overlay.querySelector('#overlay-search-input');
  const grid = overlay.querySelector('#overlay-search-results-grid');
  input.focus();
  
  input.oninput = () => {
    const q = input.value.trim().toLowerCase(); if (!q) { grid.innerHTML = ''; return; }
    const filtered = products.filter(p => p.name.toLowerCase().includes(q) || (p.author && p.author.toLowerCase().includes(q)));
    grid.innerHTML = filtered.map(p => `
      <div class="search-result-item" onclick="window.goToProductDetail('${p.id}')">
        <div class="mini-cover-wrap"><img src="${p.image ? p.image + '&fm=webp&q=60' : ''}" alt="${p.name}" class="mini-cover-img" loading="lazy" width="80" height="110"></div>
        <h3 class="mini-title">${p.name}</h3>
      </div>`).join('');
  };
};

window.goToProductDetail = async function(id) {
  const product = products.find(p => p.id === id); if (!product) return;
  const isWish = wishlist.includes(product.id);
  const existing = document.querySelector('.full-page-overlay'); if (existing) existing.remove();
  const overlay = document.createElement('div'); overlay.className = 'full-page-overlay';
  overlay.innerHTML = `
  <div class="overlay-inner max-w-2xl">
    <div class="overlay-header justify-between">
      <h2 class="overlay-title">Details</h2>
      <button id="close-product-overlay" class="close-btn" aria-label="Close product details">Close</button>
    </div>
    <div class="overlay-body pb-10">
      <div class="details-cover-wrap"><img src="${product.image ? product.image + '&fm=webp&q=80' : ''}" alt="${product.name}" class="details-cover-img" loading="lazy" width="240" height="320"></div>
      <div class="details-meta-row">
        <h1 class="details-title font-serif">${product.name}</h1>
        <button id="overlay-wishlist" class="wishlist-toggle-btn" aria-label="Toggle Wishlist">
          <svg class="heart-icon ${isWish ? 'filled' : ''}" viewBox="0 0 24 24" fill="${isWish ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
          </svg>
        </button>
      </div>
      <p class="details-price">${formatPrice(product.price)}</p>
      <div class="details-specs">
        <p><span class="label">Author:</span> ${product.author||'Unknown'}</p>
        <p><span class="label">Stock:</span> ${getStockDisplay(product.stock)}</p>
        <p class="description">${product.desc||'No details available.'}</p>
      </div>
      <div class="details-reviews-section">
        <p class="section-title">Customer Reviews</p>
        <div id="compiled-product-reviews" class="reviews-list">Loading reviews...</div>
        <div id="submission-review-box" class="review-form hidden">
          <p class="form-title">Write feedback</p>
          <input type="number" id="review-rating-input" min="1" max="5" placeholder="Rating (1-5)" class="form-input" aria-label="Review rating value between 1 and 5">
          <textarea id="review-comment-input" rows="3" placeholder="Review details..." class="form-textarea" aria-label="Review detailed feedback description"></textarea>
          <button id="post-review-btn" class="btn-primary w-full" aria-label="Submit review data">Submit</button>
        </div>
      </div>
    </div>
    <div class="overlay-footer">
      <button class="btn-primary flex-1 add-to-cart-btn" data-id="${product.id}" aria-label="Add book to cart">Add to Cart</button>
      <button class="btn-secondary flex-1 buy-now-btn" data-id="${product.id}" aria-label="Instantly purchase book">Buy Now</button>
    </div>
  </div>`;

  document.body.appendChild(overlay); document.body.style.overflow = 'hidden';
  overlay.querySelector('#close-product-overlay').onclick = () => {
    document.title = "Shobdotori Premium Store | Curated Bookstore & AI Literary Assistant";
    window.closeOverlay(overlay);
  };
  
  const wishBtn = overlay.querySelector('#overlay-wishlist');
  wishBtn.onclick = () => {
    const idx = wishlist.indexOf(product.id);
    if (idx > -1) wishlist.splice(idx,1); else wishlist.push(product.id);
    saveWishlist(); window.goToProductDetail(product.id);
  };
  
  overlay.querySelector('.add-to-cart-btn').onclick = () => {
    const ex = cart.find(i => i.id === product.id); if (ex) ex.qty++; else cart.push({ id: product.id, qty: 1 });
    saveCart(); showAlert("Product added to bag!");
  };

  overlay.querySelector('.buy-now-btn').onclick = () => {
    window.closeOverlay(overlay); openCheckout([{ id: product.id, qty: 1 }], product.price);
  };

  const reviewContainer = overlay.querySelector('#compiled-product-reviews');
  try {
    const res = await fetch(API_BASE + `/api/reviews/${product.id}`);
    const rData = await res.json();
    if (rData.length === 0) {
      reviewContainer.innerHTML = '<p class="empty-review">No reviews yet.</p>';
    } else {
      reviewContainer.innerHTML = rData.map(r => `
        <div class="review-item">
          <p class="review-author">${r.userName} (${r.rating}/5)</p>
          <p class="review-text">${r.text}</p>
        </div>`).join('');
    }
  } catch(e) { reviewContainer.innerHTML = 'Reviews offline.'; }

  if (currentUser) {
    overlay.querySelector('#submission-review-box').classList.remove('hidden');
    overlay.querySelector('#post-review-btn').onclick = async () => {
      const rating = Number(overlay.querySelector('#review-rating-input').value);
      const text = overlay.querySelector('#review-comment-input').value.trim();
      if (!rating || !text) return showAlert('Please fill out all fields.');
      try {
        const postRes = await fetch(API_BASE + "/api/reviews", {
          method: "POST",
          headers: getHeaders(),
          body: JSON.stringify({ productId: product.id, rating, text })
        });
        const ans = await postRes.json();
        if (ans.success) {
          showAlert("Review submitted successfully!");
          window.goToProductDetail(product.id);
        } else {
          showAlert(ans.error);
        }
      } catch(err) { showAlert("Submissions failed."); }
    };
  }
};

window.openCheckout = async function(items, subtotal) {
  const existing = document.querySelector('.full-page-overlay'); if (existing) existing.remove();
  const overlay = document.createElement('div'); overlay.className = 'full-page-overlay';
  
  let itemsHtml = items.map(item => {
    const p = products.find(prod => prod.id === item.id);
    return p ? `
      <div class="checkout-item" data-id="${p.id}" data-price="${p.price}">
        <img src="${p.image ? p.image + '&fm=webp&q=60' : ''}" alt="${p.name}" class="checkout-item-img" loading="lazy" width="50" height="66">
        <div class="checkout-item-details">
          <p class="item-title">${p.name}</p>
          <span class="item-qty">Qty: ${item.qty}</span>
        </div>
        <p class="item-total-price">${formatPrice(p.price * item.qty)}</p>
      </div>` : '';
  }).join('');

  overlay.innerHTML = `
  <div class="overlay-inner max-w-2xl">
    <div class="overlay-header justify-between">
      <h2 class="overlay-title font-serif">Checkout</h2>
      <button id="cancel-checkout" class="close-btn" aria-label="Cancel active checkout process">Close</button>
    </div>
    <div class="overlay-body">
      <div class="checkout-items-list">${itemsHtml}</div>
      <div class="checkout-form">
        <p class="form-section-title">Shipping Details</p>
        <input id="ch-name" placeholder="Full Name" class="form-input" aria-label="Shipping Full Name">
        <input id="ch-email" type="email" placeholder="Email" class="form-input" aria-label="Shipping Email Address">
        <input id="ch-mobile" type="tel" placeholder="Mobile Number" class="form-input" aria-label="Shipping Mobile Contact Phone">
        <input id="ch-address" placeholder="Address" class="form-input" aria-label="Shipping Street Address">
        <div class="form-grid-2">
          <input id="ch-city" placeholder="City" class="form-input" aria-label="Shipping City">
          <input id="ch-zip" placeholder="Pincode" class="form-input" aria-label="Shipping ZIP Pincode">
        </div>
      </div>
      <div class="checkout-summary-row">
        <span>Total</span><span id="order-total" class="grand-total">${formatPrice(subtotal)}</span>
      </div>
    </div>
    <div class="overlay-footer">
      <button id="confirm-order" class="btn-secondary w-full" aria-label="Process order payment">Confirm & Pay</button>
    </div>
  </div>`;

  document.body.appendChild(overlay); document.body.style.overflow = 'hidden';
  overlay.querySelector('#cancel-checkout').onclick = () => window.closeOverlay(overlay);

  overlay.querySelector('#confirm-order').onclick = async () => {
    const name = $('#ch-name').value.trim();
    const email = $('#ch-email').value.trim();
    const mobile = $('#ch-mobile').value.trim();
    const address = $('#ch-address').value.trim();
    const city = $('#ch-city').value.trim();
    const zip = $('#ch-zip').value.trim();

    if (!name || !email || !mobile || !address || !city || !zip) return showAlert('Please fill out all fields.');

    // Dynamic library call only when user initiates checkout payment (Performance Rules)
    try {
      await loadScript("https://checkout.razorpay.com/v1/checkout.js");
    } catch (e) {
      return showAlert("Payment gateway failed to load. Please try again.");
    }

    const configRes = await fetch(API_BASE + "/api/config");
    const configData = await configRes.json();

    const rzpOptions = {
      key: configData.razorpayKeyId,
      amount: Math.round(subtotal * 100),
      currency: "INR",
      name: "Shobdotori Bookstore",
      handler: async function (response) {
        try {
          const orderRes = await fetch(API_BASE + "/api/orders", {
            method: "POST",
            headers: getHeaders(),
            body: JSON.stringify({
              customer: { name, email, mobile, address, city, zip },
              items, subtotal, discount: 0, shipping: 0, total: subtotal,
              paymentId: response.razorpay_payment_id
            })
          });
          const ans = await orderRes.json();
          if (ans.success) {
            showAlert("Order placed successfully!");
            cart = []; saveCart(); window.closeOverlay(overlay);
          } else {
            showAlert(ans.error);
          }
        } catch(e) { showAlert("Checkout error occurred."); }
      }
    };
    new Razorpay(rzpOptions).open();
  };
};

function openChatOverlay() {
  const existing = document.querySelector('#chat-overlay-page'); if (existing) existing.remove();
  const overlay = document.createElement('div'); overlay.id = 'chat-overlay-page'; overlay.className = 'full-page-overlay';
  overlay.innerHTML = `
  <div class="overlay-inner max-w-2xl">
    <div class="overlay-header-chat">
      <div class="chat-top-row">
        <h2 class="chat-main-title" id="chat-header-title">AI Book Assistant</h2>
        <button id="chat-close-overlay" class="close-btn" aria-label="Close active chat session">Close</button>
      </div>
      <div class="chat-tabs">
        <button id="chat-tab-admin" class="chat-tab-btn" aria-label="Switch chat to live helpdesk admin">Chat With Admin</button>
        <button id="chat-tab-ai" class="chat-tab-btn active" aria-label="Switch chat to AI Assistant">AI Assistant</button>
      </div>
    </div>
    <div id="chat-messages-area" class="overlay-body chat-messages-bg"></div>
    <div class="chat-input-sticky">
      <div class="chat-input-wrapper">
        <input id="chat-input-overlay" placeholder="Send a message..." class="chat-text-input" aria-label="Type your message description">
        <button id="send-msg-overlay" class="chat-send-btn" aria-label="Send your message">Send</button>
      </div>
    </div>
  </div>`;

  document.body.appendChild(overlay); document.body.style.overflow = 'hidden';
  overlay.querySelector('#chat-close-overlay').onclick = () => window.closeOverlay(overlay);
  
  const cont = overlay.querySelector('#chat-messages-area');
  const tabAdmin = overlay.querySelector('#chat-tab-admin');
  const tabAi = overlay.querySelector('#chat-tab-ai');
  
  let mode = 'ai'; let aiHistory = [];

  const renderAiChat = () => {
    cont.innerHTML = aiHistory.map(m => `
      <div class="chat-bubble-container ${m.role === 'assistant' ? 'assistant' : 'user'}">
        <div class="chat-bubble">
          ${m.content}
        </div>
      </div>`).join('');
    cont.scrollTop = cont.scrollHeight;
  };

  tabAdmin.onclick = () => {
    if (!currentUser) return showAlert("Please log in first.");
    mode = 'admin';
    tabAdmin.classList.add('active');
    tabAi.classList.remove('active');
    cont.innerHTML = '<p class="chat-status">Connecting to Admin live desk...</p>';
  };

  tabAi.onclick = () => {
    mode = 'ai';
    tabAi.classList.add('active');
    tabAdmin.classList.remove('active');
    renderAiChat();
  };

  const sendMessage = async () => {
    const text = overlay.querySelector('#chat-input-overlay').value.trim(); if (!text) return;
    overlay.querySelector('#chat-input-overlay').value = '';
    
    if (mode === 'ai') {
      aiHistory.push({ role: 'user', content: text }); renderAiChat();
      try {
        const response = await fetch(API_BASE + "/api/chat/message", {
          method: "POST",
          headers: getHeaders(),
          body: JSON.stringify({ mode, history: aiHistory })
        });
        const ans = await response.json();
        if (ans.success) {
          aiHistory.push({ role: 'assistant', content: ans.text });
        } else {
          aiHistory.push({ role: 'assistant', content: 'Connection timed out.' });
        }
      } catch(e) { aiHistory.push({ role: 'assistant', content: 'Connection timed out.' }); }
      renderAiChat();
    } else {
      try {
        await fetch(API_BASE + "/api/chat/message", {
          method: "POST",
          headers: getHeaders(),
          body: JSON.stringify({ mode, text, userId: currentUser.uid })
        });
        cont.innerHTML += `<div class="chat-bubble-container user"><div class="chat-bubble">${text}</div></div>`;
      } catch(e) {}
    }
  };

  overlay.querySelector('#send-msg-overlay').onclick = sendMessage;
};

function showAlert(msg) {
  const existing = document.querySelector('.alert-modal-container'); if (existing) existing.remove();
  const container = document.createElement('div'); container.className = 'alert-modal-container';
  container.innerHTML = `
    <div class="alert-modal-bg"></div>
    <div class="alert-modal-content">
      <p class="alert-message">${msg}</p>
      <button class="close-btn close-alert">Dismiss</button>
    </div>`;
  document.body.appendChild(container);
  setTimeout(() => container.querySelector('.alert-modal-bg').classList.add('active'), 10);
  
  const closeAlert = () => {
    container.querySelector('.alert-modal-content').classList.add('closing');
    container.querySelector('.alert-modal-bg').classList.remove('active');
    setTimeout(() => container.remove(), 260);
  };
  container.querySelector('.close-alert').onclick = closeAlert;
}

function observeReveal() {
  if (revealObserver) revealObserver.disconnect();
  revealObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) entry.target.classList.add('is-visible');
    });
  }, { threshold: 0.08 });
  document.querySelectorAll('.reveal-on-scroll').forEach(el => revealObserver.observe(el));
}

function updateCartBadge() {
  const c = $('#cart-count'); if (!c) return;
  const count = cart.length; c.textContent = count;
  c.style.display = count ? 'flex' : 'none';
}
function updateWishlistBadge() {
  const c = $('#wishlist-count'); if (!c) return;
  const count = wishlist.length; c.textContent = count;
  c.style.display = count ? 'flex' : 'none';
}

async function init() {
  setupUI(); updateProfileUI();
  
  const pending = localStorage.getItem('shobdotori_pending_email');
  if (pending) {
    window.openOtpVerificationOverlay(pending, "Customer");
  }

  await loadAllData();
}
document.addEventListener('DOMContentLoaded', init);
</script>
