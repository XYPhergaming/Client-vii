<body class="bg-white text-gray-900">

<!-- HEADER -->

  <div class="max-w-7xl mx-auto px-3 sm:px-5 w-full flex items-center justify-between">
    <a href="#" class="text-lg sm:text-xl font-semibold tracking-tight text-black font-serif">Shobdotori</a>
    <div class="flex items-center gap-4 sm:gap-5">
      
      <!-- Wishlist Button -->

      <!-- Tracking Button -->

<footer class="relative mt-16 mb-8 px-3 sm:px-5">

<!-- FLOATING CHAT TRIGGER -->
<button id="chat-btn" class="fixed bottom-10 right-6 z-40 w-14 h-14 bg-purple-600 hover:bg-purple-700 hover:scale-110 active:scale-95 text-white rounded-full flex items-center justify-center shadow-2xl transition-all duration-300" aria-label="Open AI Assistant Workspace">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="w-7 h-7 text-white" fill="none" aria-hidden="true">
    <path d="M7 4C5.343 4 4 5.343 4 7V13C4 14.657 5.343 16 7 16H8V20L12.5 16H17C18.657 16 20 14.657 20 13V7C20 5.343 18.657 4 17 4H7Z" fill="currentColor"/>
    <rect x="8" y="8" width="8" height="1.5" rx="0.75" fill="white"/>

  </svg>
</button>

<script>
// ==========================================
// CLIENT-SIDE WEB CONTROLLER
// ==========================================
const API_BASE = "https://client-vi.vercel.app";

let products = [], categories = [], categoryMap = {}, activeCategory = 'all';
let cart = JSON.parse(localStorage.getItem('shobdotori_cart') || '[]');
let wishlist = JSON.parse(localStorage.getItem('shobdotori_wishlist') || '[]');
let currentUser = JSON.parse(localStorage.getItem('shobdotori_user') || 'null');
let revealObserver = null;

const $ = (s) => document.querySelector(s);
const $$ = (s) => document.querySelectorAll(s);

// Helper function to build headers
function getHeaders() {
  const headers = { "Content-Type": "application/json" };
  if (currentUser && currentUser.uid) {
    headers["x-user-uid"] = currentUser.uid;
    headers["x-user-email"] = currentUser.email;
  }
  return headers;
}

function saveCart() { localStorage.setItem('shobdotori_cart', JSON.stringify(cart)); updateCartBadge(); }
function saveWishlist() { localStorage.setItem('shobdotori_wishlist', JSON.stringify(wishlist)); updateWishlistBadge(); }

function formatPrice(p) { return '₹' + Number(p).toFixed(2); }
function discountPercent(o,c) { if(!o||o<=c) return null; return Math.round(((o-c)/o)*100); }
function getStockDisplay(stock) { return (stock === undefined || stock === null || stock === '' || stock === 0) ? '0' : stock; }

async function loadAllData() {
  try {
    const [pRes, cRes] = await Promise.all([
      fetch(API_BASE + "/api/products"), 
      fetch(API_BASE + "/api/categories")
    ]);
    if (!pRes.ok || !cRes.ok) throw new Error("Server payload query failed.");
    products = await pRes.json();
    categories = await cRes.json();
    categories.forEach(cat => categoryMap[cat.id] = cat.name);
    await loadFooterSocials();
  } catch(e) { 
    console.warn("Catalog connection error. Loading offline skeleton states safely:", e); 
  } finally {
    document.body.classList.add('ready');
    renderMainView();
    observeReveal();
    updateCartBadge(); updateWishlistBadge();
  }
}

async function loadFooterSocials() {
  const container = $('#footer-social-container'); if (!container) return;
  try {
    const res = await fetch(API_BASE + "/api/socials");
    const data = await res.json();
    let html = '';
    if (data.facebook) html += `<a href="${data.facebook}" target="_blank" rel="noopener noreferrer" class="social-bubble social-bubble-facebook" aria-label="Facebook Profile"><i class="fab fa-facebook-f text-black" aria-hidden="true"></i></a>`;
    if (data.instagram) html += `<a href="${data.instagram}" target="_blank" rel="noopener noreferrer" class="social-bubble social-bubble-instagram" aria-label="Instagram Profile"><i class="fab fa-instagram text-black" aria-hidden="true"></i></a>`;
    if (data.twitter) html += `<a href="${data.twitter}" target="_blank" rel="noopener noreferrer" class="social-bubble social-bubble-twitter" aria-label="Twitter Profile"><i class="fab fa-twitter-x text-black" aria-hidden="true"></i></a>`;
    if (data.linkedin) html += `<a href="${data.linkedin}" target="_blank" rel="noopener noreferrer" class="social-bubble social-bubble-linkedin" aria-label="LinkedIn Profile"><i class="fab fa-linkedin-in text-black" aria-hidden="true"></i></a>`;
    if (data.telegram) html += `<a href="${data.telegram}" target="_blank" rel="noopener noreferrer" class="social-bubble social-bubble-telegram" aria-label="Telegram Channel"><i class="fab fa-telegram-plane text-black" aria-hidden="true"></i></a>`;
    container.innerHTML = html;
  } catch (err) { console.error('Error rendering socials: ', err); }
}

window.closeOverlay = function(overlayElement) {
  if (!overlayElement) return;
  overlayElement.classList.add('closing');
  overlayElement.addEventListener('animationend', function onEnd(e) {
    if (e.target === overlayElement) {
      overlayElement.remove();
      if (!document.querySelector('.full-page-overlay:not(.closing)')) {
        document.body.style.overflow = '';
      }
      overlayElement.removeEventListener('animationend', onEnd);
    }
  });
};

function getRatingStarsHTML(rating) {
  if (!rating) return '';
  let stars = '';
  for (let i = 1; i <= 5; i++) {
    stars += `<i class="${i <= Math.round(rating) ? 'fa-solid fa-star text-yellow-400' : 'fa-regular fa-star text-gray-300'} text-[10px]" aria-hidden="true"></i>`;
  }
  return `<div class="flex items-center gap-0.5 justify-center mt-1">${stars} <span class="text-[9px] text-gray-500 font-medium ml-1">(${Number(rating).toFixed(1)})</span></div>`;
}

function productCard(product) {
  const disc = discountPercent(product.originalPrice, product.price);
  return `
  <div class="group cursor-pointer reveal-on-scroll hover-lift text-center" onclick="window.goToProductDetail('${product.id}')">
    <div class="book-cover-wrap mb-1.5 shadow-sm">
      <img src="${product.image||''}" alt="${product.name}" class="book-cover-img" onerror="this.style.display='none';this.parentElement.style.background='#F3F0FF';" loading="lazy" width="120" height="160">
      ${product.badge?`<span class="absolute top-1 left-1 px-1 py-0.5 rounded-full bg-white/90 backdrop-blur-sm text-[7px] font-bold uppercase text-gray-900">${product.badge}</span>`:''}
      ${disc ? `<span class="absolute top-1 right-1 px-1 py-0.5 rounded-full bg-red-500 text-white text-[7px] font-bold">-${disc}%</span>` : ''}
    </div>
    <div class="space-y-0.5 px-0.5">
      <h3 class="text-[10px] sm:text-xs font-semibold text-gray-900 line-clamp-1">${product.name}</h3>
      <div class="flex items-center justify-center gap-1.5">
        <span class="font-bold text-xs sm:text-sm text-gray-900">${formatPrice(product.price)}</span>
        ${product.originalPrice > product.price ? `<span class="text-[9px] text-gray-500 line-through">${formatPrice(product.originalPrice)}</span>` : ''}
      </div>
      ${product.averageRating ? getRatingStarsHTML(product.averageRating) : ''}
    </div>
    <button class="mt-2 w-full py-2 bg-black hover:bg-gray-800 text-white rounded-lg text-[10px] sm:text-xs font-semibold transition-all flex items-center justify-center gap-1 add-to-cart-btn" data-id="${product.id}" aria-label="Add ${product.name} to Cart">
      <span class="btn-text">Add to Cart</span>
    </button>
  </div>`;
}

function attachListeners() {
  $$('.add-to-cart-btn').forEach(b => b.onclick = (e) => {
    e.stopPropagation();
    const id = String(b.dataset.id);
    const existing = cart.find(i => String(i.id) === id);
    if (existing) existing.qty++; else cart.push({ id, qty: 1 });
    saveCart();
    b.classList.add('animate-add-success');
    b.innerHTML = `<svg class="w-3.5 h-3.5 text-white animate-check-pop" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg> Added`;
    setTimeout(() => {
      b.classList.remove('animate-add-success');
      b.innerHTML = '<span class="btn-text">Add to Cart</span>';
    }, 1400);
  });
}

function filterProducts(catId) {
  activeCategory = catId; const grid = $('#products-grid'); if (!grid) return;
  let filtered = catId === 'all' ? products : products.filter(p => p.category === catId);
  const sorted = [...filtered].sort((a,b) => (b.reviews||0) - (a.reviews||0));
  grid.innerHTML = sorted.length ? sorted.map(p => productCard(p)).join('') : '<p class="col-span-full text-center text-gray-500 py-8 text-sm">No products found</p>';
  attachListeners();
  observeReveal();
}

function renderMainView() {
  const main = $('#main-content');
  main.innerHTML = `
  <section class="relative w-full rounded-2xl sm:rounded-3xl h-[280px] sm:h-[480px] lg:h-[580px] overflow-hidden mt-2 shadow-lg ring-1 ring-black/5 isolate">
    <div class="absolute inset-0 bg-[#F3F0FF] overflow-hidden">
      <div class="absolute top-[-15%] right-[-10%] w-[300px] sm:w-[600px] h-[300px] sm:h-[600px] rounded-full bg-gradient-to-b from-purple-300 via-indigo-300 to-transparent blur-[100px] opacity-60 animate-float-slow mix-blend-multiply" aria-hidden="true"></div>
      <div class="absolute bottom-[-10%] left-[-10%] w-[250px] sm:w-[450px] h-[250px] sm:h-[450px] rounded-full bg-gradient-to-tr from-violet-400 via-fuchsia-200 to-blue-200 blur-[80px] opacity-50 animate-float-medium mix-blend-multiply" aria-hidden="true"></div>
    </div>
    <div class="absolute inset-0 flex items-center justify-center text-center px-4">
      <div class="max-w-md sm:max-w-xl reveal-on-scroll">
        <h1 class="text-2xl sm:text-4xl lg:text-5xl font-semibold text-gray-900 tracking-tighter mb-3">Your Premier Literary Haven</h1>
        <p class="text-xs sm:text-base text-gray-600 max-w-xs sm:max-w-lg mx-auto mb-5">Selected collections and titles direct to your bookshelf.</p>
        <a href="#products" class="inline-flex items-center gap-2.5 bg-white text-gray-900 pl-6 pr-4 py-2.5 rounded-full shadow-lg hover:scale-105 transition-transform active:scale-95" aria-label="Browse catalog items">
          <span class="text-sm sm:text-base font-extrabold tracking-tight">Shop Collection</span>
          <svg viewBox="0 0 48 48" class="w-4 h-4 text-gray-800" aria-hidden="true"><path d="M16 10L32 24L16 38" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </a>
      </div>
    </div>
  </section>
  <section id="products" class="mt-10 sm:mt-14">
    <h2 class="text-lg sm:text-2xl font-semibold text-gray-900 reveal-on-scroll mb-3">Discover Collection</h2>
    <div class="mb-5 relative reveal-on-scroll">
      <input type="text" id="product-search" placeholder="Search by book title, author name or keywords..." class="w-full px-4 py-3 pr-10 border border-gray-100 bg-gray-50/50 rounded-2xl text-xs outline-none cursor-pointer" aria-label="Search bookstore collections" readonly>
      <span class="absolute right-3.5 top-3.5 text-gray-400">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
      </span>
    </div>
    <div class="flex flex-nowrap gap-1.5 mb-4 overflow-x-auto no-scrollbar pb-1 w-full" id="category-tabs">
      <span class="cat-tab active" data-cat="all">All</span>
      ${categories.map(c => `<span class="cat-tab" data-cat="${c.id}">${c.name}</span>`).join('')}
    </div>
    <div class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 xl:grid-cols-7 gap-2 sm:gap-2.5" id="products-grid"></div>
  </section>`;

  $$('.cat-tab').forEach(tab => {
    tab.onclick = () => {
      $$('.cat-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      filterProducts(tab.dataset.cat);
    };
  });

  const searchInput = $('#product-search');
  if (searchInput) searchInput.onclick = () => window.openSearchOverlay();

  filterProducts('all');
  observeReveal();
}

window.openSearchOverlay = function() {
  const existing = document.querySelector('#search-overlay-page'); if (existing) existing.remove();
  const overlay = document.createElement('div'); overlay.id = 'search-overlay-page'; overlay.className = 'full-page-overlay';
  overlay.innerHTML = `
  <div class="flex flex-col h-full w-full max-w-2xl mx-auto bg-white">
    <div class="flex items-center gap-3 px-5 py-4 border-b bg-white sticky top-0 z-10">
      <input id="overlay-search-input" type="text" placeholder="Search books..." class="w-full px-4 py-3 pr-10 border border-purple-100 bg-purple-50/20 rounded-2xl text-xs outline-none" aria-label="Enter book search parameters">
      <button id="close-search-overlay" class="close-btn" aria-label="Close search window">Close</button>
    </div>
    <div class="flex-1 overflow-y-auto p-5 bg-white">
      <div id="overlay-search-results-grid" class="grid grid-cols-2 sm:grid-cols-3 gap-3"></div>
    </div>
  </div>`;
  
  document.body.appendChild(overlay); document.body.style.overflow = 'hidden';
  overlay.querySelector('#close-search-overlay').onclick = () => window.closeOverlay(overlay);
  
  const input = overlay.querySelector('#overlay-search-input');
  const grid = overlay.querySelector('#overlay-search-results-grid');
  input.focus();
  
  input.oninput = () => {
    const q = input.value.trim().toLowerCase(); if (!q) { grid.innerHTML = ''; return; }
    const filtered = products.filter(p => p.name.toLowerCase().includes(q) || (p.author && p.author.toLowerCase().includes(q)));
    grid.innerHTML = filtered.map(p => `
      <div class="group cursor-pointer hover-lift text-center" onclick="window.goToProductDetail('${p.id}')">
        <div class="book-cover-wrap mb-1.5 shadow-sm"><img src="${p.image||''}" alt="${p.name}" class="book-cover-img" loading="lazy" width="120" height="160"></div>
        <h3 class="text-[10px] sm:text-xs font-semibold text-gray-900">${p.name}</h3>
      </div>`).join('');
  };
};

window.goToProductDetail = async function(id) {
  const product = products.find(p => p.id === id); if (!product) return;
  const isWish = wishlist.includes(product.id);
  const existing = document.querySelector('.full-page-overlay'); if (existing) existing.remove();
  const overlay = document.createElement('div'); overlay.className = 'full-page-overlay';
  overlay.innerHTML = `
  <div class="flex flex-col h-full w-full max-w-2xl mx-auto bg-white">
    <div class="flex items-center justify-between px-5 py-4 border-b bg-white sticky top-0 z-10">
      <h2 class="text-base font-bold text-gray-900">Details</h2>

    saveWishlist(); window.goToProductDetail(product.id);
  };
  
  overlay.querySelector('.add-to-cart-btn').onclick = () => {
    const ex = cart.find(i => i.id === product.id); if (ex) ex.qty++; else cart.push({ id: product.id, qty: 1 });
    saveCart(); showAlert("Product added to bag!");
  };

  overlay.querySelector('.buy-now-btn').onclick = () => {
    window.closeOverlay(overlay); openCheckout([{ id: product.id, qty: 1 }], product.price);
  };

  // Fetch reviews from API
  const reviewContainer = overlay.querySelector('#compiled-product-reviews');
  try {
    const res = await fetch(API_BASE + `/api/reviews/${product.id}`);

    if (rData.length === 0) {
      reviewContainer.innerHTML = 'No reviews yet.';

    overlay.querySelector('#submission-review-box').classList.remove('hidden');
    overlay.querySelector('#post-review-btn').onclick = async () => {
      const rating = Number(overlay.querySelector('#review-rating-input').value);
      const text = overlay.querySelector('#review-comment-input').value.trim();
      if (!rating || !text) return showAlert('Please fill out all fields.');
      try {
        const postRes = await fetch(API_BASE + "/api/reviews", {
          method: "POST",
          headers: getHeaders(),
          body: JSON.stringify({ productId: product.id, rating, text })
        });
        const ans = await postRes.json();
        if (ans.success) {
          showAlert("Review submitted successfully!");
          window.goToProductDetail(product.id);
        } else {
          showAlert(ans.error);
        }
      } catch(err) { showAlert("Submissions failed."); }
    };
  }
};

  const overlay = document.createElement('div'); overlay.className = 'full-page-overlay';
  
  let itemsHtml = items.map(item => {
    const p = products.find(prod => prod.id === item.id);
    return p ? `
      <div class="checkout-item flex gap-3 items-center bg-gray-50 rounded-xl p-3" data-id="${p.id}" data-price="${p.price}">
        <img src="${p.image||''}" alt="${p.name}" class="custom-cart-wish-img" loading="lazy" width="50" height="66">

        </div>

  overlay.innerHTML = `
  <div class="flex flex-col h-full w-full max-w-2xl mx-auto bg-white">

      <div class="space-y-3 pt-3 border-t">
        <p class="text-xs font-bold uppercase tracking-wider text-gray-500">Shipping Details</p>
        <input id="ch-name" placeholder="Full Name" class="w-full px-4 py-3 border rounded-xl text-xs outline-none" aria-label="Shipping Full Name">
        <input id="ch-email" type="email" placeholder="Email" class="w-full px-4 py-3 border rounded-xl text-xs outline-none" aria-label="Shipping Email Address">
        <input id="ch-mobile" type="tel" placeholder="Mobile Number" class="w-full px-4 py-3 border rounded-xl text-xs outline-none" aria-label="Shipping Mobile Contact Phone">
        <input id="ch-address" placeholder="Address" class="w-full px-4 py-3 border rounded-xl text-xs outline-none" aria-label="Shipping Street Address">
        <div class="flex gap-2">
          <input id="ch-city" placeholder="City" class="w-1/2 px-4 py-3 border rounded-xl text-xs outline-none" aria-label="Shipping City">
          <input id="ch-zip" placeholder="Pincode" class="w-1/2 px-4 py-3 border rounded-xl text-xs outline-none" aria-label="Shipping ZIP Pincode">
        </div>
      </div>
      <div class="space-y-2 pt-3 border-t">
        <div class="flex justify-between text-xs text-gray-900 font-bold"><span>Total</span><span id="order-total">${formatPrice(subtotal)}</span></div>
      </div>
    </div>
    <div class="border-t p-4 bg-white sticky bottom-0 w-full max-w-2xl mx-auto">
      <button id="confirm-order" class="w-full py-3.5 bg-purple-600 text-white rounded-xl font-bold text-xs" aria-label="Process order payment">Confirm & Pay</button>
    </div>
  </div>`;

  document.body.appendChild(overlay); document.body.style.overflow = 'hidden';
  overlay.querySelector('#cancel-checkout').onclick = () => window.closeOverlay(overlay);

  overlay.querySelector('#confirm-order').onclick = async () => {
    const name = $('#ch-name').value.trim();
    const email = $('#ch-email').value.trim();
    const mobile = $('#ch-mobile').value.trim();
    const address = $('#ch-address').value.trim();
    const city = $('#ch-city').value.trim();
    const zip = $('#ch-zip').value.trim();

    if (!name || !email || !mobile || !address || !city || !zip) return showAlert('Please fill out all fields.');

    const configRes = await fetch(API_BASE + "/api/config");
    const configData = await configRes.json();

    const rzpOptions = {
      key: configData.razorpayKeyId,
      amount: Math.round(subtotal * 100),
      currency: "INR",
      name: "Shobdotori Bookstore",
      handler: async function (response) {
        try {
          const orderRes = await fetch(API_BASE + "/api/orders", {
            method: "POST",
            headers: getHeaders(),
            body: JSON.stringify({
              customer: { name, email, mobile, address, city, zip },
              items, subtotal, discount: 0, shipping: 0, total: subtotal,
              paymentId: response.razorpay_payment_id
            })
          });
          const ans = await orderRes.json();
          if (ans.success) {
            showAlert("Order placed successfully!");
            cart = []; saveCart(); window.closeOverlay(overlay);
          } else {
            showAlert(ans.error);
          }
        } catch(e) { showAlert("Checkout error occurred."); }
      }
    };
    new Razorpay(rzpOptions).open();
  };
};

function openChatOverlay() {
  const existing = document.querySelector('#chat-overlay-page'); if (existing) existing.remove();
  const overlay = document.createElement('div'); overlay.id = 'chat-overlay-page'; overlay.className = 'full-page-overlay';
  overlay.innerHTML = `
  <div class="flex flex-col h-full w-full max-w-2xl mx-auto bg-white">
    <div class="flex flex-col gap-3 px-5 py-4 border-b bg-white sticky top-0 z-10 shadow-sm">
      <div class="flex items-center justify-between w-full">
        <h2 class="text-sm font-bold text-gray-900" id="chat-header-title">AI Book Assistant</h2>
        <button id="chat-close-overlay" class="close-btn" aria-label="Close active chat session">Close</button>
      </div>
      <div class="flex gap-2 p-1 bg-gray-100 rounded-2xl w-full max-w-md mx-auto">
        <button id="chat-tab-admin" class="flex-1 py-2 text-xs font-bold rounded-xl transition-all bg-transparent text-gray-500" aria-label="Switch chat to live helpdesk admin">Chat With Admin</button>
        <button id="chat-tab-ai" class="flex-1 py-2 text-xs font-bold rounded-xl transition-all bg-purple-600 text-white" aria-label="Switch chat to AI Assistant">AI Assistant</button>
      </div>
    </div>
    <div id="chat-messages-area" class="flex-1 overflow-y-auto p-5 bg-gray-50/50 space-y-3.5"></div>
    <div class="border-t p-3 bg-white sticky bottom-0">
      <div class="flex gap-2 items-center bg-gray-50 rounded-xl px-3 py-1 border">
        <input id="chat-input-overlay" placeholder="Send a message..." class="flex-1 bg-transparent py-2 outline-none text-xs text-gray-900" aria-label="Type your message description">
        <button id="send-msg-overlay" class="w-8 h-8 bg-purple-600 text-white rounded-lg flex items-center justify-center" aria-label="Send your message">Send</button>
      </div>
    </div>
  </div>`;

  document.body.appendChild(overlay); document.body.style.overflow = 'hidden';
  overlay.querySelector('#chat-close-overlay').onclick = () => window.closeOverlay(overlay);
  
  const cont = overlay.querySelector('#chat-messages-area');
  const tabAdmin = overlay.querySelector('#chat-tab-admin');
  const tabAi = overlay.querySelector('#chat-tab-ai');
  
  let mode = 'ai'; let aiHistory = [];

  const renderAiChat = () => {
    cont.innerHTML = aiHistory.map(m => `
      <div class="flex ${m.role === 'assistant' ? 'justify-start' : 'justify-end'}">
        <div class="max-w-[80%] px-4 py-3 rounded-2xl text-xs ${m.role === 'assistant' ? 'bg-white text-gray-800' : 'bg-purple-600 text-white'} shadow-sm">
          ${m.content}
        </div>
      </div>`).join('');
    cont.scrollTop = cont.scrollHeight;
  };

  tabAdmin.onclick = () => {
    if (!currentUser) return showAlert("Please log in first.");
    mode = 'admin';
    tabAdmin.className = "flex-1 py-2 text-xs font-bold rounded-xl transition-all bg-purple-600 text-white";
    tabAi.className = "flex-1 py-2 text-xs font-bold rounded-xl transition-all bg-transparent text-gray-500";
    cont.innerHTML = 'Connecting to Admin live desk...';
  };

  tabAi.onclick = () => {
    mode = 'ai';
    tabAi.className = "flex-1 py-2 text-xs font-bold rounded-xl transition-all bg-purple-600 text-white";
    tabAdmin.className = "flex-1 py-2 text-xs font-bold rounded-xl transition-all bg-transparent text-gray-500";
    renderAiChat();
  };

  const sendMessage = async () => {
    const text = overlay.querySelector('#chat-input-overlay').value.trim(); if (!text) return;
    overlay.querySelector('#chat-input-overlay').value = '';
    
    if (mode === 'ai') {
      aiHistory.push({ role: 'user', content: text }); renderAiChat();
      try {
        const response = await fetch(API_BASE + "/api/chat/message", {
          method: "POST",
          headers: getHeaders(),
          body: JSON.stringify({ mode, history: aiHistory })
        });
        const ans = await response.json();
        if (ans.success) {
          aiHistory.push({ role: 'assistant', content: ans.text });
        } else {
          aiHistory.push({ role: 'assistant', content: 'Connection timed out.' });
        }
      } catch(e) { aiHistory.push({ role: 'assistant', content: 'Connection timed out.' }); }
      renderAiChat();
    } else {
      try {
        await fetch(API_BASE + "/api/chat/message", {
          method: "POST",
          headers: getHeaders(),
          body: JSON.stringify({ mode, text, userId: currentUser.uid })
        });
        cont.innerHTML += `<div class="flex justify-end"><div class="bg-purple-600 text-white px-4 py-3 rounded-2xl text-xs">${text}</div></div>`;
      } catch(e) {}
    }
  };

  overlay.querySelector('#send-msg-overlay').onclick = sendMessage;
};

      </div>
    </div>`;

    document.body.appendChild(overlay); document.body.style.overflow = 'hidden';
    overlay.querySelector('#close-profile-overlay').onclick = () => window.closeOverlay(overlay);
    
    overlay.querySelector('#do-login').onclick = async () => {
      const email = $('#login-email').value.trim();
      const password = $('#login-pass').value.trim();
      try {
        const res = await fetch(API_BASE + "/api/auth/login", {
          method: "POST",
          headers: getHeaders(),
          body: JSON.stringify({ email, password })
        });
        const ans = await res.json();
        if (ans.success) {
          if (ans.needsVerification) {
            window.closeOverlay(overlay); openOtpVerificationOverlay(email, ans.name);
          } else {
            currentUser = { uid: ans.uid, email, name: ans.user.name };
            localStorage.setItem('shobdotori_user', JSON.stringify(currentUser));
            updateProfileUI(); window.closeOverlay(overlay); showAlert("Login successful!");
          }
        } else {
          showAlert(ans.error);
        }
      } catch(e) { showAlert("Authorization failure."); }
    };

    overlay.querySelector('#signup-link').onclick = () => { window.closeOverlay(overlay); openSignupOverlay(); };
  }
};

window.openSignupOverlay = function() {
  const existing = document.querySelector('.full-page-overlay'); if (existing) existing.remove();
  const overlay = document.createElement('div'); overlay.className = 'full-page-overlay';
  overlay.innerHTML = `
  <div class="flex flex-col h-full w-full max-w-2xl mx-auto bg-white">
    <div class="flex items-center justify-between px-5 py-4 border-b bg-white sticky top-0 z-10">
      <h2 class="text-base font-bold text-gray-900">Create Account</h2>
      <button id="close-signup" class="close-btn" aria-label="Close registration overlay">Close</button>
    </div>
    <div class="overlay-scroll p-6 space-y-4 text-left">
      <input id="su-name" placeholder="Full Name" class="w-full px-4 py-3 border rounded-xl text-xs outline-none" aria-label="Register Full Name">
      <input id="su-email" type="email" placeholder="Email" class="w-full px-4 py-3 border rounded-xl text-xs outline-none" aria-label="Register Email Address">
      <input id="su-pass" type="password" placeholder="Password" class="w-full px-4 py-3 border rounded-xl text-xs outline-none" aria-label="Register Account Password">
      <button id="do-signup" class="w-full py-3 bg-black text-white rounded-xl text-xs font-semibold" aria-label="Submit registration details">Sign Up</button>
    </div>
  </div>`;

  document.body.appendChild(overlay); document.body.style.overflow = 'hidden';
  overlay.querySelector('#close-signup').onclick = () => window.closeOverlay(overlay);

  overlay.querySelector('#do-signup').onclick = async () => {
    const name = $('#su-name').value.trim();
    const email = $('#su-email').value.trim();
    const password = $('#su-pass').value.trim();
    
    try {
      const res = await fetch(API_BASE + "/api/auth/signup", {
        method: "POST",
        headers: getHeaders(),
        body: JSON.stringify({ name, email, password })
      });
      const ans = await res.json();
      if (ans.success) {
        window.closeOverlay(overlay); openOtpVerificationOverlay(email, name);
      } else {
        showAlert(ans.error);
      }
    } catch(e) { showAlert("Signup execution error."); }
  };
};

window.openOtpVerificationOverlay = function(email, name) {
  const existing = document.querySelector('.full-page-overlay'); if (existing) existing.remove();
  const overlay = document.createElement('div'); overlay.className = 'full-page-overlay';
  overlay.innerHTML = `
  <div class="flex flex-col h-full w-full max-w-2xl mx-auto bg-white">
    <div class="flex items-center justify-between px-5 py-4 border-b bg-white sticky top-0 z-10">
      <h2 class="text-base font-bold text-gray-900">Email Activation</h2>
      <button id="close-otp" class="close-btn" aria-label="Close OTP panel">Close</button>
    </div>
    <div class="overlay-scroll p-6 space-y-4 text-center">
      <input id="otp-code" type="text" maxlength="6" placeholder="Enter 6-digit OTP" class="w-full text-center px-4 py-3 border rounded-xl text-xs outline-none" aria-label="6-digit OTP verification code field">
      <button id="verify-otp-btn" class="w-full py-3 bg-purple-600 text-white rounded-xl text-xs font-bold" aria-label="Submit verification code">Verify Code</button>
      <button id="resend-otp-btn" class="w-full py-2.5 border rounded-xl text-xs" aria-label="Request a new OTP code to be sent">Resend Code</button>
    </div>
  </div>`;

  document.body.appendChild(overlay); document.body.style.overflow = 'hidden';
  overlay.querySelector('#close-otp').onclick = () => window.closeOverlay(overlay);

  overlay.querySelector('#verify-otp-btn').onclick = async () => {
    const code = overlay.querySelector('#otp-code').value.trim();
    try {
      const res = await fetch(API_BASE + "/api/auth/verify", {
        method: "POST",
        headers: getHeaders(),
        body: JSON.stringify({ email, code })
      });
      const ans = await res.json();
      if (ans.success) {
        currentUser = { uid: ans.uid, email, name: ans.user.name };
        localStorage.setItem('shobdotori_user', JSON.stringify(currentUser));
        updateProfileUI(); window.closeOverlay(overlay); showAlert("Email verified successfully!");
        await loadAllData();
      } else {
        showAlert(ans.error);
      }
    } catch(e) { showAlert("Verification failed."); }
  };

  overlay.querySelector('#resend-otp-btn').onclick = async () => {
    try {
      const res = await fetch(API_BASE + "/api/auth/resend-otp", {
        method: "POST",
        headers: getHeaders(),
        body: JSON.stringify({ email })
      });
      const ans = await res.json();
      if (ans.success) showAlert("A fresh OTP code has been dispatched.");
      else showAlert(ans.error);
    } catch(e) { {} }
  };
};

function setupUI() {
  $('#cart-btn').onclick = renderCartOverlay;
  $('#wishlist-btn').onclick = renderWishlistOverlay;
  $('#chat-btn').onclick = openChatOverlay;
  $('#track-btn').onclick = window.openTracking;
  $('#profile-btn').onclick = window.openProfileOverlay;
}

function updateProfileUI() {
  const badge = $('#user-profile-badge');
  if (currentUser) badge?.classList.remove('hidden');
  else badge?.classList.add('hidden');
}

function showAlert(msg) {
  const existing = document.querySelector('.alert-modal-container'); if (existing) existing.remove();
  const container = document.createElement('div'); container.className = 'alert-modal-container';
  container.innerHTML = `
    <div class="alert-modal-bg"></div>
    <div class="alert-modal-content">
      <p class="text-sm mb-4 font-semibold text-gray-800">${msg}</p>
      <button class="close-btn close-alert">Dismiss</button>
    </div>`;
  document.body.appendChild(container);
  setTimeout(() => container.querySelector('.alert-modal-bg').classList.add('active'), 10);
  
  const closeAlert = () => {
    container.querySelector('.alert-modal-content').classList.add('closing');
    container.querySelector('.alert-modal-bg').classList.remove('active');
    setTimeout(() => container.remove(), 260);
  };
  container.querySelector('.close-alert').onclick = closeAlert;
}

function observeReveal() {
  if (revealObserver) revealObserver.disconnect();
  revealObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) entry.target.classList.add('is-visible');
    });
  }, { threshold: 0.08 });
  document.querySelectorAll('.reveal-on-scroll').forEach(el => revealObserver.observe(el));
}

function updateCartBadge() {
  const c = $('#cart-count'); if (!c) return;
  const count = cart.length; c.textContent = count;
  c.style.display = count ? 'flex' : 'none';
}
function updateWishlistBadge() {
  const c = $('#wishlist-count'); if (!c) return;
  const count = wishlist.length; c.textContent = count;
  c.style.display = count ? 'flex' : 'none';
}

async function init() {
  setupUI(); updateProfileUI();
  
  const pending = localStorage.getItem('shobdotori_pending_email');
  if (pending) {
    window.openOtpVerificationOverlay(pending, "Customer");
  }

  await loadAllData();
}
document.addEventListener('DOMContentLoaded', init);
</script>
