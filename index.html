<script>
// ==========================================
// CLIENT-SIDE WEB CONTROLLER
// ==========================================
const API_BASE = "https://client-vi.vercel.app";

let products = [], categories = [], categoryMap = {}, activeCategory = 'all';
let cart = JSON.parse(localStorage.getItem('shobdotori_cart') || '[]');
let wishlist = JSON.parse(localStorage.getItem('shobdotori_wishlist') || '[]');
let currentUser = JSON.parse(localStorage.getItem('shobdotori_user') || 'null');
let revealObserver = null;

const $ = (s) => document.querySelector(s);
const $$ = (s) => document.querySelectorAll(s);

// Dynamic script loader avoiding initial page weight block
function loadScript(src) {
  return new Promise((resolve, reject) => {
    if (document.querySelector(`script[src="${src}"]`)) {
      resolve();
      return;
    }
    const script = document.createElement('script');
    script.src = src;
    script.async = true;
    script.onload = resolve;
    script.onerror = reject;
    document.head.appendChild(script);
  });
}

function getHeaders() {
  const headers = { "Content-Type": "application/json" };
  if (currentUser && currentUser.uid) {
    headers["x-user-uid"] = currentUser.uid;
    headers["x-user-email"] = currentUser.email;
  }
  return headers;
}

function saveCart() { localStorage.setItem('shobdotori_cart', JSON.stringify(cart)); updateCartBadge(); }
function saveWishlist() { localStorage.setItem('shobdotori_wishlist', JSON.stringify(wishlist)); updateWishlistBadge(); }

function formatPrice(p) { return '₹' + Number(p).toFixed(2); }
function discountPercent(o,c) { if(!o||o<=c) return null; return Math.round(((o-c)/o)*100); }
function getStockDisplay(stock) { return (stock === undefined || stock === null || stock === '' || stock === 0) ? '0' : stock; }

// Clamps asset resolutions dynamically to resolve "oversized images" audit (PageSpeed optimization)
function getSafeImageUrl(url, targetWidth = 200) {
  const fallbackCover = "https://images.unsplash.com/photo-1543002588-bfa74002ed7e?q=80&w=200&auto=format&fit=crop&fm=webp";
  if (!url) return fallbackCover;
  if (url.includes("367db26836c1") || url.includes("photo-147")) {
    return fallbackCover;
  }
  if (url.includes("unsplash.com")) {
    const cleanBase = url.split('?')[0];
    return `${cleanBase}?auto=format&fit=crop&w=${targetWidth}&fm=webp&q=70`;
  }
  return url;
}

// 📌 STALE-WHILE-REVALIDATE CACHE CONTROLLER
async function loadAllData() {
  const cachedProducts = localStorage.getItem('swr_products');
  const cachedCategories = localStorage.getItem('swr_categories');
  
  let staleRendered = false;
  if (cachedProducts && cachedCategories) {
    try {
      products = JSON.parse(cachedProducts);
      categories = JSON.parse(cachedCategories);
      categories.forEach(cat => categoryMap[cat.id] = cat.name);
      
      // Instant visual layout injection (under 0.1s)
      document.body.classList.add('ready');
      renderMainView();
      updateCartBadge(); 
      updateWishlistBadge();
      staleRendered = true;
    } catch (e) {
      console.warn("Stale parsing fallback", e);
    }
  }

  // Silent background revalidation thread
  try {
    const [pRes, cRes] = await Promise.all([
      fetch(API_BASE + "/api/products"), 
      fetch(API_BASE + "/api/categories")
    ]);
    if (pRes.ok && cRes.ok) {
      const freshProducts = await pRes.json();
      const freshCategories = await cRes.json();
      
      localStorage.setItem('swr_products', JSON.stringify(freshProducts));
      localStorage.setItem('swr_categories', JSON.stringify(freshCategories));
      
      products = freshProducts;
      categories = freshCategories;
      categories.forEach(cat => categoryMap[cat.id] = cat.name);
      
      if (!staleRendered) {
        document.body.classList.add('ready');
      }
      renderMainView();
      updateCartBadge();
      updateWishlistBadge();
    }
  } catch(e) { 
    console.warn("Background revalidation offline:", e); 
    if (!staleRendered) {
      document.body.classList.add('ready');
      renderMainView();
    }
  }
}

        <svg class="social-svg-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.69-.88-.48-1.38-.78-2.23-1.33-.99-.64-.35-.99.22-1.62.15-.16 2.71-2.48 2.76-2.69a.2.2 0 00-.05-.18c-.06-.05-.14-.03-.21-.02-.09.02-1.49.95-4.22 1.9-.4.14-.76.21-1.08.2-.36 0-1.05-.2-1.56-.37-.63-.2-1.12-.31-1.08-.66.02-.18.27-.36.74-.55 2.92-1.27 4.86-2.11 5.83-2.52 2.78-1.16 3.35-1.36 3.73-1.37.08 0 .27.02.39.12.1.08.13.19.14.27-.01.06.01.24 0 .24z"/></svg>

    container.innerHTML = html;
  } catch (err) { console.error('Error rendering socials: ', err); }
}

window.closeOverlay = function(overlayElement) {
  if (!overlayElement) return;
  overlayElement.classList.add('closing');
  
  const handleEnd = (e) => {
    if (e.target === overlayElement) {
      overlayElement.remove();
      if (!document.querySelector('.full-page-overlay:not(.closing)')) {
        document.body.style.overflow = '';
      }
      overlayElement.removeEventListener('animationend', handleEnd);
      overlayElement.removeEventListener('transitionend', handleEnd);
    }
  };
  
  overlayElement.addEventListener('animationend', handleEnd);
  overlayElement.addEventListener('transitionend', handleEnd);
  
  // Guard-rail timeout fallback if animations are blocked
  setTimeout(() => {
    if (document.body.contains(overlayElement)) {
      overlayElement.remove();
      if (!document.querySelector('.full-page-overlay:not(.closing)')) {
        document.body.style.overflow = '';
      }
    }
  }, 350);
};

function getRatingStarsHTML(rating) {
  if (!rating) return '';
  let stars = '';
  for (let i = 1; i <= 5; i++) {
    const filled = i <= Math.round(rating);
    stars += `
      <svg class="star-icon ${filled ? 'filled' : ''}" viewBox="0 0 24 24" fill="${filled ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
      </svg>
    `;
  }
  return `<div class="rating-container">${stars} <span class="rating-text">(${Number(rating).toFixed(1)})</span></div>`;
}

function productCard(product, index) {
  const disc = discountPercent(product.originalPrice, product.price);
  
  // Strict resolution limiting to fix "oversized images" auditing issue
  const safeImg = getSafeImageUrl(product.image, 200); 
  
  // Render critical row without lazy loading & set fetchpriority high
  const isLcp = index < 2;
  const imgAttributes = isLcp 
    ? `fetchpriority="high" width="120" height="160"` 
    : `loading="lazy" width="120" height="160"`;

  return `
  <div class="product-card reveal-on-scroll" onclick="window.goToProductDetail('${product.id}')">
    <div class="book-cover-wrap">
      <img src="${safeImg}" alt="${product.name}" class="book-cover-img" onerror="this.src='https://images.unsplash.com/photo-1543002588-bfa74002ed7e?q=80&w=120&auto=format&fit=crop&fm=webp'" ${imgAttributes}>
      ${product.badge?`<span class="badge-tag uppercase">${product.badge}</span>`:''}
      ${disc ? `<span class="badge-discount">-${disc}%</span>` : ''}
    </div>
    <div class="product-info">
      <h3 class="product-title">${product.name}</h3>
      <div class="price-row">
        <span class="price-current">${formatPrice(product.price)}</span>
        ${product.originalPrice > product.price ? `<span class="price-original">${formatPrice(product.originalPrice)}</span>` : ''}
      </div>
      ${product.averageRating ? getRatingStarsHTML(product.averageRating) : ''}
    </div>
    <button class="add-to-cart-btn btn-primary" data-id="${product.id}" aria-label="Add ${product.name} to Cart">
      <span class="btn-text">Add to Cart</span>
    </button>
  </div>`;
}

function attachListeners() {
  $$('.add-to-cart-btn').forEach(b => b.onclick = (e) => {
    e.stopPropagation();
    const id = String(b.dataset.id);
    const existing = cart.find(i => String(i.id) === id);
    if (existing) existing.qty++; else cart.push({ id, qty: 1 });
    saveCart();
    b.classList.add('animate-success');
    b.innerHTML = `
      <svg class="check-icon" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path>
      </svg> Added`;
    setTimeout(() => {
      b.classList.remove('animate-success');
      b.innerHTML = '<span class="btn-text">Add to Cart</span>';
    }, 1400);
  });
}

function filterProducts(catId) {
  activeCategory = catId; const grid = $('#products-grid'); if (!grid) return;
  let filtered = catId === 'all' ? products : products.filter(p => p.category === catId);
  const sorted = [...filtered].sort((a,b) => (b.reviews||0) - (a.reviews||0));
  grid.innerHTML = sorted.length ? sorted.map((p, index) => productCard(p, index)).join('') : '<p class="no-products">No products found</p>';
  attachListeners();
  observeReveal();
}

window.openCheckout = async function(items, subtotal) {
  const existing = document.querySelector('.full-page-overlay'); if (existing) existing.remove();
  const overlay = document.createElement('div'); overlay.className = 'full-page-overlay';
  
  let itemsHtml = items.map(item => {

    return p ? `

        </div>

      </div>` : '';
  }).join('');

  overlay.innerHTML = `
  <div class="overlay-inner max-w-2xl">
    <div class="overlay-header justify-between">
      <h2 class="overlay-title font-serif">Checkout</h2>
      <button id="cancel-checkout" class="close-btn" aria-label="Cancel active checkout process">Close</button>

        <input id="ch-email" type="email" placeholder="Email" class="form-input" aria-label="Shipping Email Address">
        <input id="ch-mobile" type="tel" placeholder="Mobile Number" class="form-input" aria-label="Shipping Mobile Contact Phone">
        <input id="ch-address" placeholder="Address" class="form-input" aria-label="Shipping Street Address">
        <div class="form-grid-2">
          <input id="ch-city" placeholder="City" class="form-input" aria-label="Shipping City">
          <input id="ch-zip" placeholder="Pincode" class="form-input" aria-label="Shipping ZIP Pincode">
        </div>
      </div>
      <div class="checkout-summary-row">
        <span>Total</span><span id="order-total" class="grand-total">${formatPrice(subtotal)}</span>
      </div>
    </div>
    <div class="overlay-footer">
      <button id="confirm-order" class="btn-secondary w-full" aria-label="Process order payment">Confirm & Pay</button>
    </div>
  </div>`;

  document.body.appendChild(overlay); document.body.style.overflow = 'hidden';
  overlay.querySelector('#cancel-checkout').onclick = () => window.closeOverlay(overlay);

  overlay.querySelector('#confirm-order').onclick = async () => {
    const name = $('#ch-name').value.trim();
    const email = $('#ch-email').value.trim();
    const mobile = $('#ch-mobile').value.trim();
    const address = $('#ch-address').value.trim();
    const city = $('#ch-city').value.trim();
    const zip = $('#ch-zip').value.trim();

    if (!name || !email || !mobile || !address || !city || !zip) return showAlert('Please fill out all fields.');

    // Dynamic library injection on pay click to speed up PageSpeed initial metrics
    try {
      await loadScript("https://checkout.razorpay.com/v1/checkout.js");
    } catch (e) {
      return showAlert("Payment gateway failed to load. Please try again.");
    }

    const configRes = await fetch(API_BASE + "/api/config");
    const configData = await configRes.json();

    const rzpOptions = {
      key: configData.razorpayKeyId,
      amount: Math.round(subtotal * 100),
      currency: "INR",
      name: "Shobdotori Bookstore",
      handler: async function (response) {
        try {
          const orderRes = await fetch(API_BASE + "/api/orders", {
            method: "POST",
            headers: getHeaders(),
            body: JSON.stringify({
              customer: { name, email, mobile, address, city, zip },
              items, subtotal, discount: 0, shipping: 0, total: subtotal,
              paymentId: response.razorpay_payment_id
            })
          });
          const ans = await orderRes.json();
          if (ans.success) {
            showAlert("Order placed successfully!");
            cart = []; saveCart(); window.closeOverlay(overlay);
          } else {
            showAlert(ans.error);
          }
        } catch(e) { showAlert("Checkout error occurred."); }
      }
    };
    new Razorpay(rzpOptions).open();
  };
};

function openChatOverlay() {
  const existing = document.querySelector('#chat-overlay-page'); if (existing) existing.remove();
  const overlay = document.createElement('div'); overlay.id = 'chat-overlay-page'; overlay.className = 'full-page-overlay';
  overlay.innerHTML = `
  <div class="overlay-inner max-w-2xl">
    <div class="overlay-header-chat">
      <div class="chat-top-row">
        <h2 class="chat-main-title" id="chat-header-title">AI Book Assistant</h2>
        <button id="chat-close-overlay" class="close-btn" aria-label="Close active chat session">Close</button>
      </div>
      <div class="chat-tabs">
        <button id="chat-tab-admin" class="chat-tab-btn" aria-label="Switch chat to live helpdesk admin">Chat With Admin</button>
        <button id="chat-tab-ai" class="chat-tab-btn active" aria-label="Switch chat to AI Assistant">AI Assistant</button>
      </div>
    </div>
    <div id="chat-messages-area" class="overlay-body chat-messages-bg"></div>
    <div class="chat-input-sticky">
      <div class="chat-input-wrapper">
        <input id="chat-input-overlay" placeholder="Send a message..." class="chat-text-input" aria-label="Type your message description">
        <button id="send-msg-overlay" class="chat-send-btn" aria-label="Send your message">Send</button>
      </div>
    </div>
  </div>`;

  document.body.appendChild(overlay); document.body.style.overflow = 'hidden';
  overlay.querySelector('#chat-close-overlay').onclick = () => window.closeOverlay(overlay);
  
  const cont = overlay.querySelector('#chat-messages-area');
  const tabAdmin = overlay.querySelector('#chat-tab-admin');
  const tabAi = overlay.querySelector('#chat-tab-ai');
  
  let mode = 'ai'; let aiHistory = [];

  const renderAiChat = () => {
    cont.innerHTML = aiHistory.map(m => `
      <div class="chat-bubble-container ${m.role === 'assistant' ? 'assistant' : 'user'}">
        <div class="chat-bubble">
          ${m.content}
        </div>
      </div>`).join('');
    cont.scrollTop = cont.scrollHeight;
  };

  tabAdmin.onclick = () => {
    if (!currentUser) return showAlert("Please log in first.");
    mode = 'admin';
    tabAdmin.classList.add('active');
    tabAi.classList.remove('active');
    cont.innerHTML = '<p class="chat-status">Connecting to Admin live desk...</p>';
  };

  tabAi.onclick = () => {
    mode = 'ai';
    tabAi.classList.add('active');
    tabAdmin.classList.remove('active');
    renderAiChat();
  };

  const sendMessage = async () => {
    const text = overlay.querySelector('#chat-input-overlay').value.trim(); if (!text) return;
    overlay.querySelector('#chat-input-overlay').value = '';
    
    if (mode === 'ai') {
      aiHistory.push({ role: 'user', content: text }); renderAiChat();
      try {
        const response = await fetch(API_BASE + "/api/chat/message", {
          method: "POST",
          headers: getHeaders(),
          body: JSON.stringify({ mode, history: aiHistory })
        });
        const ans = await response.json();
        if (ans.success) {
          aiHistory.push({ role: 'assistant', content: ans.text });
        } else {
          aiHistory.push({ role: 'assistant', content: 'Connection timed out.' });
        }
      } catch(e) { aiHistory.push({ role: 'assistant', content: 'Connection timed out.' }); }
      renderAiChat();
    } else {
      try {
        await fetch(API_BASE + "/api/chat/message", {
          method: "POST",
          headers: getHeaders(),
          body: JSON.stringify({ mode, text, userId: currentUser.uid })
        });
        cont.innerHTML += `<div class="chat-bubble-container user"><div class="chat-bubble">${text}</div></div>`;
      } catch(e) {}
    }
  };

  overlay.querySelector('#send-msg-overlay').onclick = sendMessage;
};

window.openProfileOverlay = function() {
  const existing = document.querySelector('.full-page-overlay'); if (existing) existing.remove();
  const overlay = document.createElement('div'); overlay.className = 'full-page-overlay';
  
  if (currentUser) {
    overlay.innerHTML = `
    <div class="overlay-inner max-w-2xl">
      <div class="overlay-header justify-between">
        <h2 class="overlay-title font-serif">Account</h2>
        <button id="close-profile" class="close-btn" aria-label="Close profile dashboard">Close</button>
      </div>
      <div class="overlay-body">
        <div class="profile-card">
          <p class="profile-name">${currentUser.name || 'Member'} (${currentUser.email})</p>
        </div>
        <button id="do-logout" class="btn-logout" aria-label="Log out of session">Log Out</button>
      </div>
    </div>`;

    document.body.appendChild(overlay); document.body.style.overflow = 'hidden';
    overlay.querySelector('#close-profile').onclick = () => window.closeOverlay(overlay);
    overlay.querySelector('#do-logout').onclick = () => {
      localStorage.removeItem('shobdotori_user'); currentUser = null;
      updateProfileUI(); window.closeOverlay(overlay); showAlert("Logged out successfully.");
    };
  } else {
    overlay.innerHTML = `
    <div class="overlay-inner max-w-2xl">
      <div class="overlay-header justify-between">
        <h2 class="overlay-title">Login</h2>
        <button id="close-profile-overlay" class="close-btn" aria-label="Close login overlay">Close</button>
      </div>
      <div class="overlay-body">
        <input id="login-email" type="email" placeholder="example@shobdotori.com" class="form-input" aria-label="Account Login Email">
        <input id="login-pass" type="password" placeholder="Password" class="form-input" aria-label="Account Login Password">
        <button id="do-login" class="btn-primary w-full" aria-label="Submit login session credentials">Login</button>
        <button id="signup-link" class="link-switch" aria-label="Proceed to register a new account">Create Account</button>
      </div>
    </div>`;

    document.body.appendChild(overlay); document.body.style.overflow = 'hidden';
    overlay.querySelector('#close-profile-overlay').onclick = () => window.closeOverlay(overlay);
    
    overlay.querySelector('#do-login').onclick = async () => {
      const email = $('#login-email').value.trim();
      const password = $('#login-pass').value.trim();
      try {
        const res = await fetch(API_BASE + "/api/auth/login", {
          method: "POST",
          headers: getHeaders(),
          body: JSON.stringify({ email, password })
        });
        const ans = await res.json();
        if (ans.success) {
          if (ans.needsVerification) {
            window.closeOverlay(overlay); openOtpVerificationOverlay(email, ans.name);
          } else {
            currentUser = { uid: ans.uid, email, name: ans.user.name };
            localStorage.setItem('shobdotori_user', JSON.stringify(currentUser));
            updateProfileUI(); window.closeOverlay(overlay); showAlert("Login successful!");
          }
        } else {
          showAlert(ans.error);
        }
      } catch(e) { showAlert("Authorization failure."); }
    };

    overlay.querySelector('#signup-link').onclick = () => { window.closeOverlay(overlay); openSignupOverlay(); };
  }
};

window.openSignupOverlay = function() {
  const existing = document.querySelector('.full-page-overlay'); if (existing) existing.remove();
  const overlay = document.createElement('div'); overlay.className = 'full-page-overlay';
  overlay.innerHTML = `
  <div class="overlay-inner max-w-2xl">
    <div class="overlay-header justify-between">
      <h2 class="overlay-title">Create Account</h2>
      <button id="close-signup" class="close-btn" aria-label="Close registration overlay">Close</button>
    </div>
    <div class="overlay-body">
      <input id="su-name" placeholder="Full Name" class="form-input" aria-label="Register Full Name">
      <input id="su-email" type="email" placeholder="Email" class="form-input" aria-label="Register Email Address">
      <input id="su-pass" type="password" placeholder="Password" class="form-input" aria-label="Register Account Password">
      <button id="do-signup" class="btn-primary w-full" aria-label="Submit registration details">Sign Up</button>
    </div>
  </div>`;

  document.body.appendChild(overlay); document.body.style.overflow = 'hidden';
  overlay.querySelector('#close-signup').onclick = () => window.closeOverlay(overlay);

  overlay.querySelector('#do-signup').onclick = async () => {
    const name = $('#su-name').value.trim();
    const email = $('#su-email').value.trim();
    const password = $('#su-pass').value.trim();
    
    try {
      const res = await fetch(API_BASE + "/api/auth/signup", {
        method: "POST",
        headers: getHeaders(),
        body: JSON.stringify({ name, email, password })
      });
      const ans = await res.json();
      if (ans.success) {
        window.closeOverlay(overlay); openOtpVerificationOverlay(email, name);
      } else {
        showAlert(ans.error);
      }
    } catch(e) { showAlert("Signup execution error."); }
  };
};

window.openOtpVerificationOverlay = function(email, name) {
  const existing = document.querySelector('.full-page-overlay'); if (existing) existing.remove();
  const overlay = document.createElement('div'); overlay.className = 'full-page-overlay';
  overlay.innerHTML = `
  <div class="overlay-inner max-w-2xl">
    <div class="overlay-header justify-between">
      <h2 class="overlay-title">Email Activation</h2>
      <button id="close-otp" class="close-btn" aria-label="Close OTP panel">Close</button>
    </div>
    <div class="overlay-body text-center">
      <input id="otp-code" type="text" maxlength="6" placeholder="Enter 6-digit OTP" class="form-input text-center" aria-label="6-digit OTP verification code field">
      <button id="verify-otp-btn" class="btn-secondary w-full" aria-label="Submit verification code">Verify Code</button>
      <button id="resend-otp-btn" class="btn-outline w-full" aria-label="Request a new OTP code to be sent">Resend Code</button>
    </div>
  </div>`;

  document.body.appendChild(overlay); document.body.style.overflow = 'hidden';
  overlay.querySelector('#close-otp').onclick = () => window.closeOverlay(overlay);

  overlay.querySelector('#verify-otp-btn').onclick = async () => {
    const code = overlay.querySelector('#otp-code').value.trim();
    try {
      const res = await fetch(API_BASE + "/api/auth/verify", {
        method: "POST",
        headers: getHeaders(),
        body: JSON.stringify({ email, code })
      });
      const ans = await res.json();
      if (ans.success) {
        currentUser = { uid: ans.uid, email, name: ans.user.name };
        localStorage.setItem('shobdotori_user', JSON.stringify(currentUser));
        updateProfileUI(); window.closeOverlay(overlay); showAlert("Email verified successfully!");
        await loadAllData();
      } else {
        showAlert(ans.error);
      }
    } catch(e) { showAlert("Verification failed."); }
  };

  overlay.querySelector('#resend-otp-btn').onclick = async () => {
    try {
      const res = await fetch(API_BASE + "/api/auth/resend-otp", {
        method: "POST",
        headers: getHeaders(),
        body: JSON.stringify({ email })
      });
      const ans = await res.json();
      if (ans.success) showAlert("A fresh OTP code has been dispatched.");
      else showAlert(ans.error);
    } catch(e) { {} }
  };
};

function setupUI() {
  $('#cart-btn').onclick = renderCartOverlay;
  $('#wishlist-btn').onclick = renderWishlistOverlay;
  $('#chat-btn').onclick = openChatOverlay;
  $('#track-btn').onclick = window.openTracking;
  $('#profile-btn').onclick = window.openProfileOverlay;
}

function updateProfileUI() {
  const badge = $('#user-profile-badge');
  if (currentUser) badge?.classList.remove('hidden');
  else badge?.classList.add('hidden');
}

function showAlert(msg) {
  const existing = document.querySelector('.alert-modal-container'); if (existing) existing.remove();
  const container = document.createElement('div'); container.className = 'alert-modal-container';
  container.innerHTML = `
    <div class="alert-modal-bg"></div>
    <div class="alert-modal-content">
      <p class="alert-message">${msg}</p>
      <button class="close-btn close-alert">Dismiss</button>
    </div>`;
  document.body.appendChild(container);
  setTimeout(() => container.querySelector('.alert-modal-bg').classList.add('active'), 10);
  
  const closeAlert = () => {
    container.querySelector('.alert-modal-content').classList.add('closing');
    container.querySelector('.alert-modal-bg').classList.remove('active');
    setTimeout(() => container.remove(), 260);
  };
  container.querySelector('.close-alert').onclick = closeAlert;
}

function observeReveal() {
  if (revealObserver) revealObserver.disconnect();
  revealObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) entry.target.classList.add('is-visible');
    });
  }, { threshold: 0.08 });
  document.querySelectorAll('.reveal-on-scroll').forEach(el => revealObserver.observe(el));
}

function updateCartBadge() {
  const c = $('#cart-count'); if (!c) return;
  const count = cart.length; c.textContent = count;
  c.style.display = count ? 'flex' : 'none';
}
function updateWishlistBadge() {
  const c = $('#wishlist-count'); if (!c) return;
  const count = wishlist.length; c.textContent = count;
  c.style.display = count ? 'flex' : 'none';
}

async function init() {
  setupUI(); updateProfileUI();
  
  const pending = localStorage.getItem('shobdotori_pending_email');
  if (pending) {
    window.openOtpVerificationOverlay(pending, "Customer");
  }

  await loadAllData();
  
  // Non-blocking trigger of optional footer scripts after initial load sequence finishes
  window.addEventListener('load', () => {
    setTimeout(loadFooterSocials, 600);
  });
}
document.addEventListener('DOMContentLoaded', init);
</script>
